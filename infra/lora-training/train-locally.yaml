# ai-toolkit (https://github.com/ostris/ai-toolkit) config template for
# training the cast LoRA on a local GPU (24GB+).
#
#   git clone https://github.com/ostris/ai-toolkit && cd ai-toolkit
#   pip install -r requirements.txt
#   # Put this file in config/cast.yaml; put your dataset at /data/cast/
#   python run.py config/cast.yaml
#
# Output: ./output/cast/cast.safetensors  → upload somewhere public,
# put the URL in bible/channel.yml → imageGen.replicate.castLoraUrl.

job: extension
config:
  name: cast
  process:
    - type: sd_trainer
      training_folder: ./output
      device: cuda:0
      trigger_word: ""    # multi-char LoRA: leave empty, captions carry trigger tokens
      network:
        type: lora
        linear: 16
        linear_alpha: 16
      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 4
      datasets:
        - folder_path: /data/cast       # contains pip_*.png+txt, mo_*.png+txt, bo_*.png+txt
          caption_ext: txt
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [1024]
      train:
        batch_size: 1
        steps: 1500
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: flowmatch
        optimizer: adamw8bit
        lr: 4e-4
        ema_config:
          use_ema: true
          ema_decay: 0.99
        dtype: bf16
      model:
        name_or_path: black-forest-labs/FLUX.1-dev
        is_flux: true
        quantize: true
      sample:
        sampler: flowmatch
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "pip_chicken in the sunflower garden, soft watercolor storybook"
          - "mo_chicken reading a book in the coop kitchen, soft watercolor"
          - "bo_chicken laughing by the frog pond, soft watercolor"
          - "pip_chicken and mo_chicken having tea, soft watercolor"
        neg: ""
        seed: 42
        guidance_scale: 4
        sample_steps: 25
