spring:
  application:
    name: youtube-upload-service
  # Virtual threads DELIBERATELY OFF (spring.threads.virtual.enabled).
  # YouTubeClientFactory.get() is synchronized and on first use blocks INSIDE
  # the monitor for the entire OAuth consent flow (Bind0000Receiver waits for
  # the browser callback — minutes to forever). On Java 21 a virtual thread
  # blocking inside synchronized pins its carrier, and every concurrent
  # request stuck on that monitor pins another one: a handful of requests
  # during (re)consent could starve the whole scheduler. Revisit after
  # converting that factory to a ReentrantLock (or on Java 24+, JEP 491).
server:
  port: 8085
app:
  youtube:
    application-name: tiny-chicken-world
    client-secrets-path: ${YOUTUBE_CLIENT_SECRETS:./secrets/client_secret.json}
    credentials-dir: ${YOUTUBE_CREDS_DIR:./secrets/yt-creds}
    default-category-id: "27"
    default-privacy: "private"
    default-tags: ["kids","education","learning"]
    made-for-kids: ${MADE_FOR_KIDS:true}
    contains-synthetic-media: ${CONTAINS_SYNTHETIC_MEDIA:true}
  tiktok:
    access-token: ${TIKTOK_ACCESS_TOKEN:}
  instagram:
    access-token: ${INSTAGRAM_ACCESS_TOKEN:}
    user-id: ${INSTAGRAM_USER_ID:}
  facebook:
    page-access-token: ${FACEBOOK_PAGE_ACCESS_TOKEN:}
    page-id: ${FACEBOOK_PAGE_ID:}
