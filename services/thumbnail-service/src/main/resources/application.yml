spring:
  application:
    name: thumbnail-service
  main:
    headless: true
  # Virtual threads: a thumbnail request generates multiple variants via
  # OpenAI / image-service (120s timeout per call) on the request thread.
  # Synchronized code (LayoutPicker.pick, BibleLoader.load) is in-memory or
  # one quick file read — no meaningful pinning risk.
  threads:
    virtual:
      enabled: true

server:
  port: 8086

app:
  openai:
    base-url: https://api.openai.com/v1
    api-key: ${OPENAI_API_KEY:}
    model: gpt-image-1
    size: 1536x1024
    timeout-seconds: 120
  storage:
    work-root: ${WORK_ROOT:./workdir}
  thumbnail:
    width: 1280
    height: 720
    font-path: ${FONT_PATH:/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf}
  image:
    # image-service — renders anchor-based thumbnail bases (real cast chicks).
    base-url: ${IMAGE_URL:http://image-service:8084}

resilience4j:
  retry:
    instances:
      openai-image:
        max-attempts: 3
        wait-duration: 3s
