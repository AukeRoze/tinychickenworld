<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendar — Tiny Chicken World</title>
  <link rel="stylesheet" href="/assets/css/dashboard.css">
  <!-- Sync (render-blocking) on purpose: theme.js sets data-theme pre-paint,
       so dark mode doesn't flash white (replaces the old per-page inline bootstrap). -->
  <script src="/assets/js/theme.js"></script>
</head>
<body class="ui-app">
  <div id="topbar"></div>
  <p class="sub"><a href="/ui/index.html">← all jobs</a></p>

  <div class="cal-bar">
    <h1 id="cal-title">📅 Calendar</h1>
    <span class="filter-row">
      <button class="btn sm" id="cal-prev">← Prev</button>
      <button class="btn sm" id="cal-today">Today</button>
      <button class="btn sm" id="cal-next">Next →</button>
    </span>
  </div>
  <p class="sub small">Set a planned publish date from a job's Planning section. Click a chip to open the job.</p>

  <div id="cal-host" class="sub small">loading…</div>

  <div id="toast-host"></div>

  <script src="/assets/js/nav.js"></script>
  <script type="module" src="/assets/js/calendar-page.js"></script>
</body>
</html>
