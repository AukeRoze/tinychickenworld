# Voice handling. Three modes:
#   silent     — generate silent MP3 of estimated duration (no characters speak)
#   elevenlabs — full TTS via ElevenLabs (one voice per character)
#   sounds     — character-specific chicken sound effects from bible/sfx/
#                + optional narrator TTS for intro/outro lines
#
# `sounds` mode is the Shaun-the-Sheep / Pingu approach — chickens
# communicate via sound + emotion + expression, no spoken words. Massively
# scalable globally (no language barrier), authentic to the characters,
# zero per-video TTS cost. Recommended default.
voice:
  mode: ${VOICE_MODE:silent}      # silent | elevenlabs | sounds
  # ──────────────────────────────────────────────────────────────────
  # Sounds-mode configuration
  # ──────────────────────────────────────────────────────────────────
  sfx:
    rootPath: "/bible/sfx"        # mounted readonly into voice-service
    # How long each SFX clip plays per script line, in seconds. Sounds get
    # naturally repeated/stretched if the line was longer in dialogue mode.
    defaultClipDuration: 1.5
    # If a clip is too short for the scene's narration target, we loop it
    # this many extra times (with small pitch variation) to fill the gap.
    maxLoopRepeat: 3
    # Per-character SFX volume gain (dB). Pip's high peeps need less, Bo's
    # dramatic squawks get pulled down a bit so they don't dominate.
    gainDb:
      pip: -2.0
      mo:  0.0
      bo:  -3.0
    # When a scene's character + emotion has no matching file, fall back
    # to this generic per-character "talking" sound. Last-resort safety net.
    fallbackEmotion: "content"
  # ──────────────────────────────────────────────────────────────────
  # Narrator (optional 2-3 spoken lines per video)
  # ──────────────────────────────────────────────────────────────────
  narrator:
    enabled: ${NARRATOR_ENABLED:false}   # OFF by default — robotic espeak narration clashes with the chicken-sounds (Pingu-style) aesthetic. Flip to true if you want spoken hook/closer lines.
    # Free local TTS via Java's built-in voice synth (espeak-ng inside the
    # voice-service container — no external API cost, no language lock-in).
    # Switch to "elevenlabs" if you want a polished narrator voice (€0.05
    # per video, single line ≈ 100 chars).
    tts: ${NARRATOR_TTS:espeak}   # espeak | elevenlabs
    # When narrator runs, these scene phases get narrator lines automatically
    # mixed in over the sounds (low volume, warm).
    phases:
      - hook        # opening branding: "Welcome to Tiny Chicken World"
      - closer      # closing CTA + lesson recap
    # Templates — use {topic}, {lesson}, {channel} placeholders.
    phrases:
      hook: "Welcome to Tiny Chicken World — today, {topic}."
      closer: "Today's lesson: {lesson}. See you next time, friends!"
    voiceGainDb: -1.0
    musicDuck: -6.0               # background music dips this many dB during narrator

# ──────────────────────────────────────────────────────────────────────
# Scene-transition styling (video-assembly-service, hot-reloaded ≤1 min —
# edit, save, re-assemble; geen rebuild nodig).
#
# Per episode-fase: het ffmpeg xfade-type van de overgang NAAR scènes in
# die fase + de duur in seconden (0.05–1.5; korter = energieker).
# Ongeldige types worden geweigerd (luide log) en vallen terug op de
# ingebouwde defaults — een typefout kan een render nooit breken.
#
# Beschikbare types (stock ffmpeg xfade):
#   fades:    fade fadeblack fadewhite fadegrays dissolve distance
#   wipes:    wipeleft wiperight wipeup wipedown wipetl wipetr wipebl wipebr
#             radial circleopen circleclose circlecrop rectcrop
#             horzopen horzclose vertopen vertclose
#             diagtl diagtr diagbl diagbr hlslice hrslice vuslice vdslice
#   slides:   slideleft slideright slideup slidedown
#             smoothleft smoothright smoothup smoothdown
#             coverleft coverright coverup coverdown
#             revealleft revealright revealup revealdown
#   stylized: pixelize hblur zoomin squeezev squeezeh
# ──────────────────────────────────────────────────────────────────────
assembly:
  transitions:
    hook:        { type: fade,        seconds: 0.10 }  # bijna-cut — tempo vasthouden
    setup:       { type: fade,        seconds: 0.15 }
    development: { type: fade,        seconds: 0.15 }
    climax:      { type: fadewhite,   seconds: 0.35 }  # witflits het wonder in (audit-tip: leest als magie)
    # Einde ruimer aangezet (feedback 2026-06-11: "op het laatste nog wat
    # hakkerig") — het rustige slot verdraagt en verdient langere overgangen.
    resolution:  { type: dissolve,    seconds: 0.60 }  # zacht landen
    closer:      { type: circleclose, seconds: 0.80 }  # iris-uit — het klassieke kindertv-einde
    default:     { type: fade,        seconds: 0.20 }
